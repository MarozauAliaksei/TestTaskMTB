services:
  ollama:
    image: ollama/ollama:latest
    container_name: mtbank-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  pipelines:
    build:
      context: .
      dockerfile: Dockerfile.pipelines
    container_name: mtbank-pipelines
    ports:
      - "9099:9099"
    volumes:
      - .:/app/pipelines
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - ollama
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mtbank-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: mtbank-open-webui
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URLS=http://pipelines:9099
      - OPENAI_API_KEYS=${PIPELINES_API_KEY}
      - WEBUI_AUTH=false
    depends_on:
      - pipelines
    restart: unless-stopped

volumes:
  ollama_data:
  openwebui_data:
